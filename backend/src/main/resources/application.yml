spring:
  application:
    name: dental-clinic-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dental_clinic}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:4644f4e60a74dc}
    password: ${MAIL_PASSWORD:4df7ad3b7d0492}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

application:
  jwt:
    secret: ${JWT_SECRET:3f8b2c9d4e1a7f6b0c5d2e8a4b9f3c7d1e6a2b5f8c0d4e7a1b3c6d9e2f5a8b1}
    expiration-ms: 86400000

server:
  port: 8002

clinic:
  name: Dental Clinic
  address: Addis Ababa, Ethiopia
  phone: "+251-XXX-XXXX"
  email: info@dentalclinic.com

notification:
  from-email: ${FROM_EMAIL:noreply@dentalclinic.com}
  from-name: ${FROM_NAME:Dental Clinic}
  enabled: ${NOTIFICATIONS_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  default-flat-param-object: true

logging:
  level:
    "org.hibernate.SQL": DEBUG
    "org.hibernate.type.descriptor.sql.BasicBinder": TRACE