spring:
  application:
    name: dental-clinic-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dental_clinic}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

application:
  jwt:
    secret: ${JWT_SECRET:3f8b2c9d4e1a7f6b0c5d2e8a4b9f3c7d1e6a2b5f8c0d4e7a1b3c6d9e2f5a8b1}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

server:
  port: ${SERVER_PORT:8002}

clinic:
  name: ${CLINIC_NAME:Dental Clinic}
  address: ${CLINIC_ADDRESS:Addis Ababa, Ethiopia}
  phone: ${CLINIC_PHONE:+251-XXX-XXXX}
  email: ${CLINIC_EMAIL:info@dentalclinic.com}

notification:
  from-email: ${FROM_EMAIL:noreply@dentalclinic.com}
  from-name: ${FROM_NAME:Dental Clinic}
  enabled: ${NOTIFICATIONS_ENABLED:true}

cors:
  allowed-origins:
    - http://localhost:5050
    - http://localhost:3000
    - http://localhost:80

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  default-flat-param-object: true

logging:
  level:
    root: INFO
    com.sadbob.dentalclinic: INFO